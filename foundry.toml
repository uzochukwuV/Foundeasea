[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

# Disable size checks for development
size = false

[profile.ci]
fuzz_runs = 256
verbosity = 4

[profile.mantle]
rpc_url = "https://rpc.sepolia.mantle.xyz"
chain_id = 5003
gas_price = 20000000

[profile.base]
rpc_url = "https://sepolia.base.org"
chain_id = 84532
gas_price = 10000000

[profile.rhc]
rpc_url = "https://testnet.rpc.robinhood.com"
chain_id = 1300

[rpc_endpoints]
mantleSepolia = "https://rpc.sepolia.mantle.xyz"
baseSepolia = "https://sepolia.base.org"
rhcTestnet = "https://testnet.rpc.robinhood.com"

[etherscan]
mantleSepolia = { key = "${MANTLE_API_KEY}" }
baseSepolia = { key = "placeholder" }
