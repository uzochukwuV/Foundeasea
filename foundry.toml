[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true

[profile.ci]
fuzz_runs = 256
verbosity = 4

[rpc_endpoints]
mantleSepolia = "https://rpc.sepolia.mantle.xyz"
baseSepolia = "https://sepolia.base.org"

[etherscan]
mantleSepolia = { key = "${MENTLE_API_KEY}" }
baseSepolia = { key = "${BASESCAN_API_KEY}" }
